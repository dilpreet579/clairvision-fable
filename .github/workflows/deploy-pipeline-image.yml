name: Deploy Pipeline Image

# Build+push only — nothing SSHs anywhere. The pipeline VM is launched
# on-demand by the API (see api/clairvision_api/services/pipeline_vm_service.py),
# not by this workflow; the on-demand EC2 user-data just `docker run`s
# whatever image :latest currently points at.
on:
  push:
    branches: [main]
    paths:
      - "pipeline/**"
      - "shared/**"
      - ".github/workflows/deploy-pipeline-image.yml"
  workflow_dispatch: {}

env:
  IMAGE: ghcr.io/${{ github.repository }}-pipeline

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - id: tag
        run: echo "tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # cache-to: type=gha needs the docker-container buildx driver — the
      # default `docker` driver (what you get without this step) doesn't
      # support cache export at all and fails the build outright.
      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: pipeline/Dockerfile.cpu
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
