name: Deploy API

# Frontend is deployed separately by Vercel's own GitHub integration — this
# workflow only builds/ships the API (+ shared package it depends on) and
# rolls it out to the always-on EC2 host. Only build when something that
# actually ends up in the image changed.
on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - "shared/**"
      - "infra/postgres/migrations/**"
      - "alembic.ini"
      - "production.yml"
      - "docker-compose.yml"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {}

env:
  IMAGE: ghcr.io/${{ github.repository }}-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - id: tag
        run: echo "tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # cache-to: type=gha needs the docker-container buildx driver — the
      # default `docker` driver (what you get without this step) doesn't
      # support cache export at all and fails the build outright.
      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: api/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose files to the server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml,production.yml"
          target: "/opt/clairvision"
          strip_components: 0

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /opt/clairvision

            # PROD_ENV_FILE holds the full contents of the server's .env
            # (DB password, CORS origins, cookie settings, ...) — kept as
            # one secret rather than dozens so it stays a straight copy of
            # .env.example filled in, not a scattered mapping to maintain.
            cat > .env <<'ENVEOF'
            ${{ secrets.PROD_ENV_FILE }}
            ENVEOF

            export IMAGE_TAG=${{ needs.build-and-push.outputs.tag }}

            docker compose -f docker-compose.yml -f production.yml pull api
            docker compose -f docker-compose.yml -f production.yml up -d db redis
            docker compose -f docker-compose.yml -f production.yml run --rm api \
              alembic upgrade head
            docker compose -f docker-compose.yml -f production.yml up -d api caddy
            docker image prune -f
