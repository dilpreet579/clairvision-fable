services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-clairvision}
      POSTGRES_USER: ${POSTGRES_USER:-clairvision}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      # Localhost-bound only: this stack has no auth (v1) and must not
      # be exposed beyond the local machine as-is.
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clairvision} -d ${POSTGRES_DB:-clairvision}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    # No volume: Redis is a fully ephemeral cache/broker by design.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  pipeline-worker:
    # Requires the NVIDIA container runtime; opt in via:
    #   docker compose --profile pipeline up -d pipeline-worker
    profiles: ["pipeline"]
    build:
      context: .
      dockerfile: pipeline/Dockerfile
    env_file: .env
    environment:
      POSTGRES_HOST: db
    volumes:
      - faiss_indexes:/app/indexes
      - ./pipeline/weights:/app/weights:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  postgres_data:
  faiss_indexes:
