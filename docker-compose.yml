services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-clairvision}
      POSTGRES_USER: ${POSTGRES_USER:-clairvision}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      # Localhost-bound only: this stack has no auth (v1) and must not
      # be exposed beyond the local machine as-is.
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clairvision} -d ${POSTGRES_DB:-clairvision}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    # No volume: Redis is a fully ephemeral cache/broker by design.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  pipeline-worker:
    # Requires the NVIDIA container runtime; opt in via:
    #   docker compose --profile pipeline up -d pipeline-worker
    profiles: ["pipeline"]
    build:
      context: .
      dockerfile: pipeline/Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_HOST: db
    volumes:
      - faiss_indexes:/app/indexes
      - ./pipeline/weights:/app/weights:ro
      - model_cache:/root/.cache          # CLIP weights (~1.7GB), downloaded once
      - insightface_models:/root/.insightface   # buffalo_l pack (~275MB)
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  pipeline-worker-cpu:
    # GPU-less variant for dev machines / CI / full-stack regression:
    #   docker compose --profile pipeline-cpu up -d pipeline-worker-cpu
    # Functionally identical (models fall back to CPU); slow per image.
    profiles: ["pipeline-cpu"]
    build:
      context: .
      dockerfile: pipeline/Dockerfile.cpu
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_HOST: db
    volumes:
      - faiss_indexes:/app/indexes
      - ./pipeline/weights:/app/weights:ro
      - model_cache:/root/.cache          # CLIP weights (~1.7GB), downloaded once
      - insightface_models:/root/.insightface   # buffalo_l pack (~275MB)
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_HOST: db
    volumes:
      # Writable: the worker still writes indexes directly here in local
      # dev, but in production the API also lazy-pulls index files from S3
      # and caches them into this same path when the pipeline worker runs
      # on a separate host and can no longer share this volume directly.
      - faiss_indexes:/app/indexes
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        # Inlined at build time; the browser calls the API via the
        # host-published port, so localhost is correct here.
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_USE_MOCKS: "false"
    depends_on:
      - api
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  postgres_data:
  faiss_indexes:
  model_cache:
  insightface_models:
